name: iPad IPA Builder (Final Path Fix)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install -g expo-cli
          npm install

      - name: Create Fake GoogleService-Info.plist
        run: |
          printf '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CLIENT_ID</key><string>test</string></dict></plist>' > GoogleService-Info.plist

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios

      - name: Build Payload
        run: |
          mkdir -p Payload
          # ios klasöründeki dosyaları garantiye alıyoruz
          cd ios
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" -maxdepth 1)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          
          echo "Workspace bulundu: $WORKSPACE_PATH"
          echo "Scheme bulundu: $SCHEME_NAME"

          xcodebuild -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ../build
          
          cd ..
          cp -r build/Build/Products/Debug-iphonesimulator/*.app Payload/
          zip -r DepTime.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DepTime-iPad-Installer
          path: DepTime.ipa
          retention-days: 1