name: iPad IPA Builder (Firebase Fix)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install -g expo-cli
          npm install

      - name: Create Fake GoogleService-Info.plist
        run: |
          # Firebase eklentisinin prebuild sırasında hata vermemesi için sahte dosya oluşturuyoruz
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CLIENT_ID</key><string>test</string></dict></plist>' > GoogleService-Info.plist

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios

      - name: Build Payload
        run: |
          mkdir -p Payload
          # Sideloadly için debug simülatör build'i oluşturuyoruz
          xcodebuild -workspace ios/*.xcworkspace -scheme $(ls ios | grep .xcodeproj | cut -d. -f1) -configuration Debug -sdk iphonesimulator -derivedDataPath build
          cp -r build/Build/Products/Debug-iphonesimulator/*.app Payload/
          zip -r DepTime.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DepTime-iPad-Installer
          path: DepTime.ipa
          retention-days: 1