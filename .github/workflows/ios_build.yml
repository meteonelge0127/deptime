name: iPad IPA Builder (v4 Update)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # v4'e güncellendi

      - name: Setup Node.js
        uses: actions/setup-node@v4 # v4'e güncellendi
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install -g expo-cli
          npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios

      - name: Build Payload
        run: |
          mkdir -p Payload
          # Simülatör buildi oluşturup Payload klasörüne paketliyoruz
          xcodebuild -workspace ios/*.xcworkspace -scheme $(ls ios | grep .xcodeproj | cut -d. -f1) -configuration Debug -sdk iphonesimulator -derivedDataPath build
          cp -r build/Build/Products/Debug-iphonesimulator/*.app Payload/
          zip -r DepTime.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # v4'e güncellendi (Hatanın çözümü burada)
        with:
          name: DepTime-iPad-Installer
          path: DepTime.ipa
          retention-days: 1 # Yer kaplamaması için 1 gün sonra silinir